name: Deploy to Vercel Automatically

on:
  push:
    branches:
      - main  # deploy automático quando houver push no main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Pegar o código
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Configurar Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 3️⃣ Instalar dependências
      - name: Install dependencies
        run: npm ci

      # 4️⃣ Criar .env a partir dos secrets do GitHub
      - name: Create .env file
        run: |
          echo "NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}" >> .env
          echo "NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}" >> .env

      # 5️⃣ Build do projeto React
      - name: Build project
        run: npm run build

      # 6️⃣ Deploy automático para Vercel via CLI
      - name: Deploy to Vercel
        run: npx vercel --prod --yes -t ${{ secrets.VERCEL_TOKEN }}
