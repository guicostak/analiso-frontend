<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#3730A3"/>
    </radialGradient>
    <radialGradient id="skinGrad" cx="50%" cy="20%" r="85%">
      <stop offset="0%" stop-color="#FDCFAA"/>
      <stop offset="100%" stop-color="#E6A07A"/>
    </radialGradient>
    <linearGradient id="hairGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3B2314"/>
      <stop offset="100%" stop-color="#1E0E06"/>
    </linearGradient>
    <linearGradient id="shirtGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E0E0FF"/>
      <stop offset="100%" stop-color="#C7C7F8"/>
    </linearGradient>
    <clipPath id="circleClip">
      <circle cx="100" cy="100" r="100"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="url(#bgGrad)"/>

  <g clip-path="url(#circleClip)">

    <!-- Shirt body -->
    <ellipse cx="100" cy="195" rx="65" ry="40" fill="url(#shirtGrad)"/>
    <path d="M42 172 Q68 156 100 153 Q132 156 158 172 L165 220 L35 220Z" fill="url(#shirtGrad)"/>

    <!-- Collar / tie area -->
    <path d="M91 153 L100 164 L109 153 L113 220 L87 220Z" fill="#A5A6F6" opacity="0.75"/>
    <path d="M100 164 L104 178 L100 182 L96 178 Z" fill="#6366F1"/>

    <!-- Neck -->
    <rect x="88" y="133" width="24" height="24" rx="12" fill="url(#skinGrad)"/>
    <!-- Neck shadow -->
    <rect x="88" y="145" width="24" height="12" rx="0" fill="#D4906A" opacity="0.2"/>

    <!-- Head shape -->
    <ellipse cx="100" cy="106" rx="46" ry="50" fill="url(#skinGrad)"/>

    <!-- Jaw / chin -->
    <ellipse cx="100" cy="145" rx="32" ry="16" fill="#E6A07A"/>

    <!-- Hair - base fill covering top of head -->
    <ellipse cx="100" cy="66" rx="48" ry="30" fill="url(#hairGrad)"/>

    <!-- Hair top shape -->
    <path d="M52 78 Q100 40 148 78 Q142 56 100 52 Q58 56 52 78Z" fill="url(#hairGrad)"/>

    <!-- Hair left side sideburn -->
    <path d="M54 90 Q52 110 56 128 Q60 120 60 104 Q58 96 54 90Z" fill="url(#hairGrad)"/>
    <!-- Hair right side sideburn -->
    <path d="M146 90 Q148 110 144 128 Q140 120 140 104 Q142 96 146 90Z" fill="url(#hairGrad)"/>

    <!-- Ear left -->
    <ellipse cx="54" cy="110" rx="9" ry="12" fill="#E6A07A"/>
    <ellipse cx="54" cy="110" rx="5.5" ry="8" fill="#D4906A"/>
    <path d="M52 104 Q56 110 52 116" stroke="#C07850" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Ear right -->
    <ellipse cx="146" cy="110" rx="9" ry="12" fill="#E6A07A"/>
    <ellipse cx="146" cy="110" rx="5.5" ry="8" fill="#D4906A"/>
    <path d="M148 104 Q144 110 148 116" stroke="#C07850" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Eyebrows - left (slightly angled, natural) -->
    <path d="M74 91 Q83 86 92 89" stroke="url(#hairGrad)" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <!-- Eyebrows - right -->
    <path d="M108 89 Q117 86 126 91" stroke="url(#hairGrad)" stroke-width="4.5" fill="none" stroke-linecap="round"/>

    <!-- Eye socket shadow -->
    <ellipse cx="83" cy="104" rx="14" ry="12" fill="#D4906A" opacity="0.15"/>
    <ellipse cx="117" cy="104" rx="14" ry="12" fill="#D4906A" opacity="0.15"/>

    <!-- Eye whites -->
    <ellipse cx="83" cy="104" rx="12" ry="11" fill="white"/>
    <ellipse cx="117" cy="104" rx="12" ry="11" fill="white"/>

    <!-- Iris - left -->
    <circle cx="83" cy="105" r="8.5" fill="#2B5BAD"/>
    <circle cx="83" cy="105" r="5.5" fill="#1A3F8F"/>
    <!-- Iris - right -->
    <circle cx="117" cy="105" r="8.5" fill="#2B5BAD"/>
    <circle cx="117" cy="105" r="5.5" fill="#1A3F8F"/>

    <!-- Pupil -->
    <circle cx="83" cy="105" r="3.5" fill="#0A0A1A"/>
    <circle cx="117" cy="105" r="3.5" fill="#0A0A1A"/>

    <!-- Eye shine -->
    <circle cx="86.5" cy="101.5" r="2.8" fill="white" opacity="0.9"/>
    <circle cx="120.5" cy="101.5" r="2.8" fill="white" opacity="0.9"/>
    <!-- Secondary shine -->
    <circle cx="80" cy="107" r="1.2" fill="white" opacity="0.5"/>
    <circle cx="114" cy="107" r="1.2" fill="white" opacity="0.5"/>

    <!-- Nose bridge shadow -->
    <path d="M99 96 Q98 108 98 116" stroke="#D4906A" stroke-width="1" fill="none" opacity="0.3"/>

    <!-- Nose tip -->
    <path d="M94 120 Q92 126 90 128 Q100 132 110 128 Q108 126 106 120Z" fill="#D4906A" opacity="0.5"/>
    <!-- Nostrils -->
    <ellipse cx="92" cy="127" rx="3" ry="2" fill="#C07850" opacity="0.45"/>
    <ellipse cx="108" cy="127" rx="3" ry="2" fill="#C07850" opacity="0.45"/>

    <!-- Philtrum -->
    <path d="M97 130 Q100 134 103 130" stroke="#D4906A" stroke-width="1.5" fill="none" opacity="0.5"/>

    <!-- Upper lip -->
    <path d="M84 136 Q92 132 100 134 Q108 132 116 136" stroke="#C07850" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Smile / mouth -->
    <path d="M84 138 Q100 152 116 138" stroke="#B07040" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- Lower lip -->
    <path d="M87 140 Q100 150 113 140 Q100 154 87 140Z" fill="#E8997A" opacity="0.45"/>

    <!-- Smile dimple lines -->
    <path d="M82 137 Q79 142 82 147" stroke="#C07850" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.35"/>
    <path d="M118 137 Q121 142 118 147" stroke="#C07850" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.35"/>

    <!-- Cheek blush -->
    <ellipse cx="70" cy="124" rx="14" ry="8" fill="#F59080" opacity="0.16"/>
    <ellipse cx="130" cy="124" rx="14" ry="8" fill="#F59080" opacity="0.16"/>

  </g>
</svg>
